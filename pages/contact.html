<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — NexusPlay</title>
  <link rel="stylesheet" href="../assets/css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

  <div id="navbar"></div>

  <!-- Page Hero -->
  <section class="page-hero">
    <div class="hero-bg">
      <div class="grid-overlay"></div>
      <div class="glow-orb orb2"></div>
    </div>
    <div class="page-hero-content">
      <span class="hero-badge">&#9993; GET IN TOUCH</span>
      <h1 class="hero-title">CONTACT <span class="accent">US</span></h1>
      <p class="hero-sub">Questions? Support? Partnerships? We're always online.</p>
    </div>
  </section>

  <!-- Contact Section -->
  <section class="section">
    <div class="contact-grid">

      <!-- Info Cards -->
      <div class="contact-info">
        <div class="contact-card">
          <span class="contact-icon">&#128241;</span>
          <h3>Support Chat</h3>
          <p>Available 24/7 — average response under 3 minutes.</p>
          <a href="#" class="btn-ghost small">Open Chat</a>
        </div>
        <div class="contact-card">
          <span class="contact-icon">&#128140;</span>
          <h3>Email</h3>
          <p>support@nexusplay.gg</p>
          <a href="mailto:support@nexusplay.gg" class="btn-ghost small">Send Email</a>
        </div>
        <div class="contact-card">
          <span class="contact-icon">&#127760;</span>
          <h3>Community</h3>
          <p>Join our Discord — 800K+ members strong.</p>
          <a href="#" class="btn-ghost small">Join Discord</a>
        </div>
      </div>

      <!-- Contact Form with Validation -->
      <div class="contact-form-wrap">
        <h2 class="section-title">SEND A <span class="accent">MESSAGE</span></h2>
        <div class="contact-form">
          <div class="form-group">
            <label>Your Name</label>
            <input type="text" id="c-name" placeholder="Gamertag or real name" oninput="validateContact()">
            <span class="field-error" id="c-name-error"></span>
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="c-email" placeholder="your@email.com" oninput="validateContact()">
            <span class="field-error" id="c-email-error"></span>
          </div>
          <div class="form-group">
            <label>Subject</label>
            <select id="c-subject" onchange="validateContact()">
              <option value="">Select a topic...</option>
              <option>Bug Report</option>
              <option>Account Issue</option>
              <option>Partnership Inquiry</option>
              <option>General Feedback</option>
            </select>
            <span class="field-error" id="c-subject-error"></span>
          </div>
          <div class="form-group">
            <label>Message</label>
            <textarea id="c-message" rows="5" placeholder="Describe your issue or message..." oninput="validateContact()"></textarea>
            <span class="field-error" id="c-message-error"></span>
          </div>
          <button class="btn-primary full-width" id="contact-submit" onclick="submitContact()" disabled>SEND MESSAGE</button>
        </div>
      </div>

    </div>
  </section>

  <div id="footer"></div>

  <div id="toast" class="toast"></div>
  <script src="../assets/js/script.js"></script>
</body>
</html>
